openapi: 3.0.3
info:
  title: Vente Facile API
  version: 1.0.0
  description: API REST pour le SaaS de gestion commerciale POS
paths:
  /api/v1/auth/login/:
    post:
      operationId: auth_login_create
      description: |-
        Vue pour la connexion (alternative au token JWT standard).
        Retourne les tokens et les informations utilisateur.

        POST /auth/login/
      tags:
        - auth
      security:
        - jwtAuth: []
        - {}
      responses:
        "200":
          description: No response body
  /api/v1/auth/logout/:
    post:
      operationId: auth_logout_create
      description: |-
        Vue pour la déconnexion (blacklist le refresh token).

        POST /auth/logout/
      tags:
        - auth
      security:
        - jwtAuth: []
      responses:
        "200":
          description: No response body
  /api/v1/auth/password-reset/:
    post:
      operationId: auth_password_reset_create
      description: |-
        Vue pour demander une réinitialisation de mot de passe.

        POST /auth/password-reset/
      tags:
        - auth
      security:
        - jwtAuth: []
        - {}
      responses:
        "200":
          description: No response body
  /api/v1/auth/password-reset/confirm/:
    post:
      operationId: auth_password_reset_confirm_create
      description: |-
        Vue pour confirmer la réinitialisation de mot de passe.

        POST /auth/password-reset/confirm/
      tags:
        - auth
      security:
        - jwtAuth: []
        - {}
      responses:
        "200":
          description: No response body
  /api/v1/auth/register/:
    post:
      operationId: auth_register_create
      description: |-
        Vue pour l'inscription d'un nouvel utilisateur.

        POST /auth/register/
      tags:
        - auth
      security:
        - jwtAuth: []
        - {}
      responses:
        "200":
          description: No response body
  /api/v1/auth/token/:
    post:
      operationId: auth_token_create
      description: |-
        Takes a set of user credentials and returns an access and refresh JSON web
        token pair to prove the authentication of those credentials.
      tags:
        - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TokenObtainPairRequest"
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/TokenObtainPairRequest"
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/TokenObtainPairRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenObtainPair"
          description: ""
  /api/v1/auth/token/blacklist/:
    post:
      operationId: auth_token_blacklist_create
      description: |-
        Takes a token and blacklists it. Must be used with the
        `rest_framework_simplejwt.token_blacklist` app installed.
      tags:
        - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TokenBlacklistRequest"
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/TokenBlacklistRequest"
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/TokenBlacklistRequest"
        required: true
      responses:
        "200":
          description: No response body
  /api/v1/auth/token/refresh/:
    post:
      operationId: auth_token_refresh_create
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
        token if the refresh token is valid.
      tags:
        - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TokenRefreshRequest"
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/TokenRefreshRequest"
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/TokenRefreshRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenRefresh"
          description: ""
  /api/v1/branches/:
    get:
      operationId: branches_list
      description: |-
        ViewSet pour la gestion des branches/succursales.

        Endpoints:
        - GET /branches/ : Liste des branches
        - POST /branches/ : Créer une branche
        - GET /branches/{id}/ : Détail d'une branche
        - PUT/PATCH /branches/{id}/ : Modifier une branche
        - DELETE /branches/{id}/ : Supprimer une branche
      parameters:
        - in: query
          name: is_active
          schema:
            type: boolean
        - in: query
          name: is_main
          schema:
            type: boolean
        - name: page
          required: false
          in: query
          description: A page number within the paginated result set.
          schema:
            type: integer
        - name: search
          required: false
          in: query
          description: A search term.
          schema:
            type: string
      tags:
        - branches
      security:
        - jwtAuth: []
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedBranchListList"
          description: ""
    post:
      operationId: branches_create
      description: |-
        ViewSet pour la gestion des branches/succursales.

        Endpoints:
        - GET /branches/ : Liste des branches
        - POST /branches/ : Créer une branche
        - GET /branches/{id}/ : Détail d'une branche
        - PUT/PATCH /branches/{id}/ : Modifier une branche
        - DELETE /branches/{id}/ : Supprimer une branche
      tags:
        - branches
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BranchCreateRequest"
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/BranchCreateRequest"
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/BranchCreateRequest"
        required: true
      security:
        - jwtAuth: []
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BranchCreate"
          description: ""
  /api/v1/branches/{id}/:
    get:
      operationId: branches_retrieve
      description: |-
        ViewSet pour la gestion des branches/succursales.

        Endpoints:
        - GET /branches/ : Liste des branches
        - POST /branches/ : Créer une branche
        - GET /branches/{id}/ : Détail d'une branche
        - PUT/PATCH /branches/{id}/ : Modifier une branche
        - DELETE /branches/{id}/ : Supprimer une branche
      parameters:
        - in: path
          name: id
          schema:
            type: string
            format: uuid
          description: A UUID string identifying this branch.
          required: true
      tags:
        - branches
      security:
        - jwtAuth: []
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BranchDetail"
          description: ""
    put:
      operationId: branches_update
      description: |-
        ViewSet pour la gestion des branches/succursales.

        Endpoints:
        - GET /branches/ : Liste des branches
        - POST /branches/ : Créer une branche
        - GET /branches/{id}/ : Détail d'une branche
        - PUT/PATCH /branches/{id}/ : Modifier une branche
        - DELETE /branches/{id}/ : Supprimer une branche
      parameters:
        - in: path
          name: id
          schema:
            type: string
            format: uuid
          description: A UUID string identifying this branch.
          required: true
      tags:
        - branches
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BranchCreateRequest"
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/BranchCreateRequest"
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/BranchCreateRequest"
        required: true
      security:
        - jwtAuth: []
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BranchCreate"
          description: ""
    patch:
      operationId: branches_partial_update
      description: |-
        ViewSet pour la gestion des branches/succursales.

        Endpoints:
        - GET /branches/ : Liste des branches
        - POST /branches/ : Créer une branche
