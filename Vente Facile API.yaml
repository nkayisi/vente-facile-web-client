  /api/v1/purchase-orders/:
    get:
      operationId: purchase_orders_list
      description: |-
        ViewSet pour la gestion des commandes d'achat.

        Endpoints:
        - GET /purchase-orders/ : Liste des commandes
        - POST /purchase-orders/ : Créer une commande
        - GET /purchase-orders/{id}/ : Détail d'une commande
        - PUT/PATCH /purchase-orders/{id}/ : Modifier une commande
        - DELETE /purchase-orders/{id}/ : Supprimer une commande
        - POST /purchase-orders/{id}/approve/ : Approuver une commande
        - POST /purchase-orders/{id}/send/ : Marquer comme envoyée
        - POST /purchase-orders/{id}/cancel/ : Annuler une commande
      parameters:
        - name: ordering
          required: false
          in: query
          description: Which field to use when ordering the results.
          schema:
            type: string
        - name: page
          required: false
          in: query
          description: A page number within the paginated result set.
          schema:
            type: integer
        - name: search
          required: false
          in: query
          description: A search term.
          schema:
            type: string
        - in: query
          name: status
          schema:
            type: string
            enum:
              - cancelled
              - confirmed
              - draft
              - partially_received
              - received
              - sent
          description: |-
            * `draft` - Brouillon
            * `sent` - Envoyé
            * `confirmed` - Confirmé
            * `partially_received` - Partiellement reçu
            * `received` - Reçu
            * `cancelled` - Annulé
        - in: query
          name: supplier
          schema:
            type: string
            format: uuid
        - in: query
          name: warehouse
          schema:
            type: string
            format: uuid
      tags:
        - purchase-orders
      security:
        - jwtAuth: []
      responses:
        "200":
          content:
            application/json:
