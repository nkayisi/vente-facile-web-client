services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.local
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
    container_name: vente-facile-frontend
    env_file:
      - .env
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - NODE_ENV=production
